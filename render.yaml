# Render.com Blueprint — деплой одной кнопкой
# 1. Форкни/залей этот репозиторий на GitHub
# 2. Зайди на https://dashboard.render.com/blueprints
# 3. Connect repo → Apply — всё само поднимется

services:
  # ─── Бэкенд ────────────────────────────────────────────────────────────────
  - type: web
    name: bomj-server
    env: node
    region: frankfurt
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000

  # ─── Фронтенд ──────────────────────────────────────────────────────────────
  - type: web
    name: bomj-client
    env: static
    region: frankfurt
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: bomj-server
          property: host
        value: https://bomj-server.onrender.com/api
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
